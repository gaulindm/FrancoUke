<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gaulinet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

    <style>
        body {
            background: linear-gradient(to right, #f9d29d, #ffd8cb);
            min-height: 100vh;
        }

        .brand-card {
            border-radius: 15px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .brand-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .brand-icon {
            font-size: 3rem;
            color: #ff7f50;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="text-center mb-5">
            <h1>Welcome to Gaulinet</h1>
            <p class="lead text-muted">
                Select a section to continue.
            </p>
        </div>

        <div class="row g-4 justify-content-center">
            {% for brand in brands %}
                <div class="col-md-4">
                    <div class="card brand-card h-100 p-4 text-center">
                        <div class="mb-3">
                            <i class="bi {{ brand.icon }} brand-icon"></i>
                        </div>

                        <h4>{{ brand.name }}</h4>

                        {% if brand.desc %}
                            <p class="text-muted">{{ brand.desc }}</p>
                        {% endif %}

                        <a href="{% url brand.url %}" class="btn btn-outline-primary mt-auto">
                            Explore
                        </a>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
